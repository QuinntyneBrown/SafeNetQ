version: '3.8'

services:
  api:
    build:
      context: ../../src/backend
      dockerfile: ../../infra/docker/Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=safenetq;Username=safenetq;Password=dev_password_123
      - Jwt__Secret=dev-secret-key-minimum-32-characters-long
      - Jwt__Issuer=SafeNetQ
      - Jwt__Audience=SafeNetQ
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../../src/web
      dockerfile: ../../infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=safenetq
      - POSTGRES_USER=safenetq
      - POSTGRES_PASSWORD=dev_password_123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safenetq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
